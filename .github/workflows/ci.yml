name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.115.* "uvicorn[standard]==0.32.*" pydantic==2.9.* httpx==0.27.* pytest==8.3.* ruff==0.7.* "numpy>=2.0" "pandas>=2.2" "statsmodels>=0.14" pyarrow
      - name: Lint
        run: ruff check app tests
      - name: Test
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/kryst-investments-llc/causal-sidecar:ci
